<<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#000000">
<title>Jacke Run</title>

<style>
:root{
--bg:#000;
--card:#111;
--line:#222;
--text:#fff;
--muted:#999;
--accent:#ff7a00;
--accent2:#ffb347;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,Helvetica,sans-serif;
background:linear-gradient(180deg,#000,#111);
color:#fff;
}

.container{
max-width:700px;
margin:auto;
padding:18px;
}

.logo{
text-align:center;
margin-bottom:20px;
}

.logo h1{
font-size:42px;
font-weight:900;
letter-spacing:2px;
}

.logo span{
color:var(--accent);
}

.logo p{
color:var(--muted);
margin-top:5px;
}

.card{
background:var(--card);
border:1px solid var(--line);
border-radius:24px;
padding:18px;
margin-bottom:16px;
}

button{
width:100%;
padding:16px;
border:none;
border-radius:18px;
font-size:18px;
font-weight:800;
cursor:pointer;
margin-top:10px;
}

.start{
background:linear-gradient(90deg,var(--accent),var(--accent2));
color:#111;
}

.stop{
background:#222;
color:#fff;
}

.pause{
background:#333;
color:#fff;
}

.stats{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.stat{
background:#0a0a0a;
padding:18px;
border-radius:18px;
text-align:center;
}

.value{
font-size:30px;
font-weight:900;
color:var(--accent);
}

.label{
font-size:12px;
color:var(--muted);
margin-top:4px;
}

.block{
background:#0a0a0a;
padding:18px;
border-radius:18px;
text-align:center;
}

.block h2{
font-size:28px;
color:var(--accent);
}

.progress{
height:16px;
background:#222;
border-radius:20px;
overflow:hidden;
margin-top:14px;
}

.bar{
height:100%;
width:0%;
background:linear-gradient(90deg,var(--accent),var(--accent2));
}

.status{
text-align:center;
margin-top:12px;
font-weight:700;
color:var(--accent2);
}

@media(max-width:600px){
.stats{
grid-template-columns:1fr;
}
.logo h1{
font-size:34px;
}
}
</style>
</head>

<body>

<div class="container">

<div class="logo">
<h1>JACKE <span>RUN</span></h1>
<p>Seu treinador inteligente de corrida</p>
</div>

<div class="card">
<button class="start" onclick="startRun()">▶ INICIAR TREINO</button>
<button class="pause" onclick="pauseRun()">⏸ PAUSAR</button>
<button class="stop" onclick="stopRun()">■ FINALIZAR</button>
</div>

<div class="card stats">

<div class="stat">
<div class="value" id="time">0:00</div>
<div class="label">TEMPO</div>
</div>

<div class="stat">
<div class="value" id="dist">0.00</div>
<div class="label">KM</div>
</div>

<div class="stat">
<div class="value" id="pace">--</div>
<div class="label">PACE</div>
</div>

<div class="stat">
<div class="value" id="speed">0.0</div>
<div class="label">KM/H</div>
</div>

</div>

<div class="card block">
<div class="label">BLOCO ATUAL</div>
<h2 id="blockName">Aguardando</h2>
<div id="blockTime">0:00</div>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<div class="status" id="status">Pronto para começar</div>
</div>

</div>

<script>
let running=false;
let paused=false;
let timer;
let startTime;
let elapsed=0;
let distance=0;
let lastPos=null;
let watchId;

let blocks=[
{name:"Aquecimento",sec:300},
{name:"Forte",sec:480},
{name:"Recuperação",sec:150},
{name:"Volta Calma",sec:300}
];

let currentBlock=0;
let blockLeft=blocks[0].sec;

function startRun(){

if(running)return;

running=true;
paused=false;

startTime=Date.now()-elapsed*1000;

timer=setInterval(tick,1000);

watchId=navigator.geolocation.watchPosition(updateGPS);

speak("Treino iniciado");

document.getElementById("status").textContent="Treino iniciado";
}

function pauseRun(){

if(!running)return;

paused=!paused;

if(paused){
clearInterval(timer);
document.getElementById("status").textContent="Pausado";
}else{
startTime=Date.now()-elapsed*1000;
timer=setInterval(tick,1000);
document.getElementById("status").textContent="Retomado";
}
}

function stopRun(){

running=false;

clearInterval(timer);

navigator.geolocation.clearWatch(watchId);

document.getElementById("status").textContent="Treino finalizado";

speak("Treino finalizado");
}

function tick(){

elapsed=Math.floor((Date.now()-startTime)/1000);

let min=Math.floor(elapsed/60);
let sec=String(elapsed%60).padStart(2,"0");

document.getElementById("time").textContent=min+":"+sec;

blockLeft--;

if(blockLeft<=0){

currentBlock++;

if(currentBlock>=blocks.length){
stopRun();
return;
}

blockLeft=blocks[currentBlock].sec;

speak(blocks[currentBlock].name);
}

updateBlock();

updatePace();
}

function updateBlock(){

let b=blocks[currentBlock];

document.getElementById("blockName").textContent=b.name;

let m=Math.floor(blockLeft/60);
let s=String(blockLeft%60).padStart(2,"0");

document.getElementById("blockTime").textContent=m+":"+s;

let pct=((b.sec-blockLeft)/b.sec)*100;

document.getElementById("bar").style.width=pct+"%";
}

function updateGPS(pos){

let lat=pos.coords.latitude;
let lon=pos.coords.longitude;
let speed=pos.coords.speed||0;

document.getElementById("speed").textContent=(speed*3.6).toFixed(1);

if(lastPos){

distance+=calc(lastPos.lat,lastPos.lon,lat,lon);

document.getElementById("dist").textContent=(distance/1000).toFixed(2);
}

lastPos={lat,lon};
}

function updatePace(){

if(distance<20)return;

let pace=elapsed/(distance/1000);

let m=Math.floor(pace/60);
let s=String(Math.round(pace%60)).padStart(2,"0");

document.getElementById("pace").textContent=m+":"+s;
}

function calc(a,b,c,d){

const R=6371000;
const p=Math.PI/180;

const x=(c-a)*p;
const y=(d-b)*p;

const q=Math.sin(x/2)**2+
Math.cos(a*p)*Math.cos(c*p)*
Math.sin(y/2)**2;

return 2*R*Math.asin(Math.sqrt(q));
}

function speak(txt){

if("speechSynthesis" in window){

let u=new SpeechSynthesisUtterance(txt);

u.lang="pt-BR";

speechSynthesis.speak(u);
}
}

updateBlock();
</script>

</body>
</html>
