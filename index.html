<!-- Arquivo index.html do Jacke Run criado no canvas. Selecione este arquivo no painel lateral para visualizar e copiar. -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Jacke Run - Strava Style</title>
</head>
<body style="margin:0;font-family:Inter,Arial,sans-serif;background:#0f0f0f;color:#fff;">
<div style="max-width:430px;margin:0 auto;min-height:100vh;background:#121212;">
  <div style="padding:22px 18px 10px;border-bottom:1px solid #222;">
    <div style="font-size:12px;color:#999;letter-spacing:2px;text-transform:uppercase;">Jacke Run</div>
    <div style="font-size:34px;font-weight:900;line-height:1;margin-top:4px;">Record</div>
  </div>

  <div style="padding:18px;">
    <div style="background:#1b1b1b;border-radius:24px;padding:22px;text-align:center;box-shadow:0 10px 30px rgba(0,0,0,.35);">
      <div style="font-size:72px;font-weight:900;letter-spacing:-2px;">00:00</div>
      <div style="color:#ff5a00;font-weight:700;letter-spacing:2px;text-transform:uppercase;font-size:12px;">Ready to Run</div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px;">
      <div style="background:#1b1b1b;border-radius:20px;padding:16px;">
        <div style="font-size:12px;color:#999;text-transform:uppercase;">Distance</div>
        <div style="font-size:28px;font-weight:900;margin-top:8px;">0.00 km</div>
      </div>
      <div style="background:#1b1b1b;border-radius:20px;padding:16px;">
        <div style="font-size:12px;color:#999;text-transform:uppercase;">Pace</div>
        <div style="font-size:28px;font-weight:900;margin-top:8px;">--:--</div>
      </div>
      <div style="background:#1b1b1b;border-radius:20px;padding:16px;">
        <div style="font-size:12px;color:#999;text-transform:uppercase;">Speed</div>
        <div style="font-size:28px;font-weight:900;margin-top:8px;">0.0</div>
      </div>
      <div style="background:#1b1b1b;border-radius:20px;padding:16px;">
        <div style="font-size:12px;color:#999;text-transform:uppercase;">GPS</div>
        <div style="font-size:28px;font-weight:900;margin-top:8px;color:#ff5a00;">OFF</div>
      </div>
    </div>

    <div style="margin-top:16px;background:#1b1b1b;border-radius:22px;padding:16px;">
      <div style="font-size:12px;color:#999;text-transform:uppercase;">Workout Blocks</div>
      <div style="margin-top:12px;padding:12px;border-radius:16px;background:#141414;display:flex;justify-content:space-between;">
        <span>Aquecimento</span><strong>10m · 7:13</strong>
      </div>
      <div style="margin-top:10px;padding:12px;border-radius:16px;background:#141414;display:flex;justify-content:space-between;">
        <span>Principal</span><strong>28m · 5:58</strong>
      </div>
      <div style="margin-top:10px;padding:12px;border-radius:16px;background:#141414;display:flex;justify-content:space-between;">
        <span>Desaquecimento</span><strong>5m · 7:13</strong>
      </div>
    </div>

    <button style="margin-top:18px;width:100%;border:none;background:#ff5a00;color:#fff;font-size:20px;font-weight:900;padding:18px;border-radius:18px;">START</button>
  </div>
</div>
</body>
</html>
