<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#000000">
<title>Jacke Run</title>

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:Arial,Helvetica,sans-serif;
padding:15px;
}

.container{
max-width:700px;
margin:auto;
}

h1{
text-align:center;
font-size:34px;
margin-bottom:20px;
}

h1 span{color:#ff7a00;}

.card{
background:#111;
padding:18px;
border-radius:22px;
margin-bottom:15px;
border:1px solid #222;
}

.title{
font-size:13px;
color:#999;
margin-bottom:10px;
text-transform:uppercase;
}

.row{
display:grid;
grid-template-columns:2fr .7fr .9fr 40px;
gap:6px;
margin-bottom:8px;
}

input{
width:100%;
padding:10px;
background:#000;
border:1px solid #333;
color:#fff;
border-radius:10px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:14px;
font-weight:900;
margin-top:10px;
font-size:16px;
}

.orange{
background:#ff7a00;
color:#fff;
}

.dark{
background:#222;
color:#fff;
}

.remove{
background:#ff3333;
margin:0;
padding:0;
}

.timer{
font-size:54px;
text-align:center;
font-weight:900;
}

.status{
text-align:center;
color:#ff7a00;
margin-top:8px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.metric{
background:#111;
padding:15px;
border-radius:18px;
text-align:center;
}

.metric h3{
font-size:12px;
color:#888;
margin-bottom:6px;
}

.metric p{
font-size:28px;
font-weight:900;
margin:0;
}
</style>
</head>

<body>

<div class="container">

<h1>Jacke <span>Run</span></h1>

<div class="card">
<div class="title">GPS</div>
<button class="orange" onclick="ativarGPS()">Ativar GPS</button>
<div id="gps" class="status">Desativado</div>
</div>

<div class="card">
<div class="title">Blocos</div>

<div id="linhas"></div>

<button class="dark" onclick="addLinha()">+ Adicionar bloco</button>
</div>

<div class="card">
<div class="timer" id="timer">0:00</div>
<div class="status" id="blocoAtual">Pronto</div>

<button class="orange" onclick="start()">START</button>
<button class="dark" onclick="pause()">PAUSE</button>
<button class="dark" onclick="stop()">STOP</button>
</div>

<div class="grid">

<div class="metric">
<h3>KM</h3>
<p id="dist">0.00</p>
</div>

<div class="metric">
<h3>PACE</h3>
<p id="pace">--</p>
</div>

<div class="metric">
<h3>KM/H</h3>
<p id="speed">0.0</p>
</div>

<div class="metric">
<h3>BLOCO</h3>
<p id="blocoNum">0</p>
</div>

</div>

</div>

<!-- RESULTADO -->

<div id="resultadoTela" style="
display:none;
position:fixed;
inset:0;
background:#000;
z-index:9999;
overflow:auto;
padding:20px;
">

<div style="max-width:700px;margin:auto;">

<h2 style="
text-align:center;
color:#ff7a00;
font-size:32px;
margin-bottom:20px;
">
JACKE RUN
</h2>

<div id="cardArea" style="
background:#111;
padding:25px;
border-radius:25px;
text-align:center;
">

<div style="color:#999;">Distância</div>
<div id="cardDist" style="font-size:50px;font-weight:900;">0</div>

<div style="margin-top:20px;color:#999;">Ritmo</div>
<div id="cardPace" style="font-size:50px;font-weight:900;">0</div>

<div style="margin-top:20px;color:#999;">Tempo</div>
<div id="cardTempo" style="font-size:50px;font-weight:900;">0</div>

<canvas id="mapaCard" width="320" height="220"
style="
margin-top:25px;
background:#000;
border-radius:18px;
border:1px solid #333;
width:100%;
max-width:320px;
"></canvas>

<div style="
margin-top:20px;
font-size:28px;
font-weight:900;
color:#ff7a00;
">
JACKE RUN
</div>

</div>

<button class="dark" onclick="fecharResultado()">Fechar</button>
<button class="orange" onclick="baixarCard()">Baixar Card</button>

</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<script>

let rota=[];
let gpsAtivo=false;
let watchId=null;

let dist=0;
let lastLat=null;
let lastLon=null;

let rodando=false;
let segundos=0;
let cron;

let bloco=0;
let tempoBloco=0;

function addLinha(nome="",min="5",ritmo="6:00"){

let div=document.createElement("div");
div.className="row";

div.innerHTML=`
<input value="${nome}">
<input value="${min}">
<input value="${ritmo}">
<button class="remove" onclick="this.parentNode.remove()">X</button>
`;

document.getElementById("linhas").appendChild(div);
}

addLinha("Aquececimento","10","7:13");
addLinha("Principal","28","5:58");
addLinha("Volta","5","7:13");

function ativarGPS(){

if(!navigator.geolocation)return;

watchId=navigator.geolocation.watchPosition(pos=>{

gpsAtivo=true;
document.getElementById("gps").innerHTML="GPS ativo";

let lat=pos.coords.latitude;
let lon=pos.coords.longitude;

rota.push({lat,lon});

if(lastLat!=null){

dist+=calcDist(lastLat,lastLon,lat,lon);
document.getElementById("dist").innerHTML=(dist/1000).toFixed(2);

}

lastLat=lat;
lastLon=lon;

if(pos.coords.speed!=null){

let kmh=pos.coords.speed*3.6;
document.getElementById("speed").innerHTML=kmh.toFixed(1);

if(kmh>0){
let pace=60/kmh;
let m=Math.floor(pace);
let s=Math.round((pace-m)*60);
if(s<10)s="0"+s;
document.getElementById("pace").innerHTML=m+":"+s;
}

}

});

}

function calcDist(a,b,c,d){

let R=6371000;
let p=Math.PI/180;

let x=(c-a)*p;
let y=(d-b)*p;

let q=
Math.sin(x/2)**2+
Math.cos(a*p)*Math.cos(c*p)*
Math.sin(y/2)**2;

return 2*R*Math.asin(Math.sqrt(q));

}

function start(){

if(rodando)return;

rodando=true;

cron=setInterval(()=>{

segundos++;
tempoBloco++;

let m=Math.floor(segundos/60);
let s=segundos%60;
if(s<10)s="0"+s;

document.getElementById("timer").innerHTML=m+":"+s;

processaBloco();

},1000);

}

function pause(){
clearInterval(cron);
rodando=false;
}

function stop(){

clearInterval(cron);
rodando=false;

mostrarResultado();

}

function processaBloco(){

let linhas=document.querySelectorAll(".row");

if(bloco>=linhas.length)return;

let nome=linhas[bloco].children[0].value;
let min=parseInt(linhas[bloco].children[1].value);

document.getElementById("blocoAtual").innerHTML=nome;
document.getElementById("blocoNum").innerHTML=bloco+1;

if(tempoBloco>=min*60){
bloco++;
tempoBloco=0;
}

}

function mostrarResultado(){

document.getElementById("resultadoTela").style.display="block";

document.getElementById("cardDist").innerHTML=
document.getElementById("dist").innerHTML+" km";

document.getElementById("cardPace").innerHTML=
document.getElementById("pace").innerHTML+"/km";

document.getElementById("cardTempo").innerHTML=
document.getElementById("timer").innerHTML;

desenharMapa();

}

function fecharResultado(){
document.getElementById("resultadoTela").style.display="none";
}

function desenharMapa(){

let c=document.getElementById("mapaCard");
let ctx=c.getContext("2d");

ctx.clearRect(0,0,c.width,c.height);
ctx.strokeStyle="#ff7a00";
ctx.lineWidth=4;

if(rota.length<2)return;

let lats=rota.map(p=>p.lat);
let lons=rota.map(p=>p.lon);

let minLat=Math.min(...lats);
let maxLat=Math.max(...lats);
let minLon=Math.min(...lons);
let maxLon=Math.max(...lons);

let pad=20;

ctx.beginPath();

rota.forEach((p,i)=>{

let x=pad+(p.lon-minLon)/(maxLon-minLon)*(c.width-pad*2);
let y=c.height-pad-(p.lat-minLat)/(maxLat-minLat)*(c.height-pad*2);

if(i==0)ctx.moveTo(x,y);
else ctx.lineTo(x,y);

});

ctx.stroke();

}

function baixarCard(){

html2canvas(document.getElementById("cardArea")).then(canvas=>{

let a=document.createElement("a");
a.download="jacke-run-card.png";
a.href=canvas.toDataURL();
a.click();

});

}

</script>

</body>
</html>
