<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#000000">
<title>Jacke Run</title>

<style>
:root{
--bg:#000;
--panel:#111;
--line:rgba(255,255,255,.08);
--text:#fff;
--muted:#a4a4a4;
--accent:#ff7a00;
--accent2:#ffb347;
--good:#39d36a;
--bad:#ff5a5a;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:Inter,Arial,sans-serif;
background:linear-gradient(180deg,#000,#0a0a0a);
color:#fff;
}

.container{
max-width:920px;
margin:auto;
padding:18px 16px 50px;
}

.hero{
text-align:center;
margin-bottom:18px;
}

.hero h1{
margin:0;
font-size:42px;
font-weight:900;
letter-spacing:.08em;
}

.hero span{color:var(--accent)}

.hero p{
margin-top:8px;
color:var(--muted);
}

.card{
background:linear-gradient(180deg,rgba(255,255,255,.03),rgba(255,255,255,.015));
border:1px solid var(--line);
border-radius:24px;
padding:16px;
margin-bottom:16px;
}

.gps-banner{
display:flex;
justify-content:space-between;
gap:10px;
align-items:center;
padding:12px;
border-radius:18px;
background:#0a0a0a;
border:1px solid var(--line);
margin-bottom:14px;
}

.gps-left{
display:flex;
gap:10px;
align-items:center;
}

.gps-dot{
width:12px;
height:12px;
border-radius:50%;
background:#666;
}

.gps-dot.on{background:var(--good)}
.gps-dot.err{background:var(--bad)}

button{
border:none;
border-radius:14px;
padding:12px 14px;
font-weight:800;
cursor:pointer;
}

.btn-primary{
background:linear-gradient(90deg,var(--accent),var(--accent2));
color:#111;
width:100%;
margin-top:10px;
}

.btn-secondary{
background:#171717;
color:#fff;
border:1px solid rgba(255,255,255,.08);
width:100%;
margin-top:10px;
}

.stats{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
}

.stat{
background:#0a0a0a;
border:1px solid rgba(255,255,255,.08);
border-radius:18px;
padding:14px;
text-align:center;
}

.stat .val{
font-size:28px;
font-weight:900;
color:var(--accent);
}

.stat .lbl{
font-size:12px;
color:var(--muted);
margin-top:4px;
}

#cardsWrap{
display:none;
}

.cards-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:14px;
}

.cards-grid canvas{
width:100%;
border-radius:20px;
background:transparent;
border:1px solid rgba(255,255,255,.06);
}

.download-btn{
margin-top:8px;
width:100%;
background:#171717;
color:#fff;
}

@media(max-width:700px){
.stats{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

<div class="container">

<div class="hero">
<h1>JACKE <span>RUN</span></h1>
<p>Treine. Corra. Compartilhe.</p>
</div>

<div class="card">

<div class="gps-banner">
<div class="gps-left">
<div class="gps-dot" id="gpsDot"></div>
<div id="gpsText">GPS não ativado</div>
</div>
<button onclick="ativarGPS()">Ativar GPS</button>
</div>

<button class="btn-primary" onclick="startRun()">▶ Iniciar treino</button>
<button class="btn-secondary" onclick="finishRun()">■ Finalizar treino</button>

</div>

<div class="card">
<div class="stats">
<div class="stat"><div class="val" id="dist">0.00</div><div class="lbl">KM</div></div>
<div class="stat"><div class="val" id="pace">--</div><div class="lbl">PACE</div></div>
<div class="stat"><div class="val" id="time">0:00</div><div class="lbl">TEMPO</div></div>
<div class="stat"><div class="val" id="speed">0.0</div><div class="lbl">KM/H</div></div>
</div>
</div>

<div class="card" id="cardsWrap">
<h2>Cards Gerados</h2>
<div class="cards-grid" id="cardsGrid"></div>
</div>

</div>

<script>
let running=false;
let startTime=0;
let timer=null;
let elapsed=0;
let dist=0;
let gpsOn=false;

function ativarGPS(){
gpsOn=true;
document.getElementById("gpsDot").className="gps-dot on";
document.getElementById("gpsText").innerText="GPS ativo";
}

function fmt(sec){
let m=Math.floor(sec/60);
let s=String(sec%60).padStart(2,"0");
return m+":"+s;
}

function startRun(){
running=true;
dist=0;
elapsed=0;
startTime=Date.now();

clearInterval(timer);

timer=setInterval(()=>{
elapsed=Math.floor((Date.now()-startTime)/1000);
dist += 0.01;

document.getElementById("time").innerText=fmt(elapsed);
document.getElementById("dist").innerText=dist.toFixed(2);

let pace=elapsed/(dist||1);
document.getElementById("pace").innerText=fmt(pace);

let speed=(dist/(elapsed/3600||1));
document.getElementById("speed").innerText=speed.toFixed(1);

},1000);
}

function finishRun(){
running=false;
clearInterval(timer);
generateCards();
}

function generateCards(){

document.getElementById("cardsWrap").style.display="block";

const grid=document.getElementById("cardsGrid");
grid.innerHTML="";

for(let i=1;i<=6;i++){

let wrap=document.createElement("div");

let c=document.createElement("canvas");
c.width=1080;
c.height=(i>=5)?1920:1080;

let x=c.getContext("2d");
x.clearRect(0,0,c.width,c.height);

x.fillStyle="#fff";
x.font="bold 64px Arial";
x.fillText("JACKE RUN",60,90);

x.font="bold 88px Arial";
x.fillText(dist.toFixed(2)+" km",60,240);

x.fillText(document.getElementById("pace").innerText+" /km",60,390);

x.fillText(document.getElementById("time").innerText,60,540);

if(i>=3){
x.strokeStyle="#ff6a00";
x.lineWidth=10;
x.beginPath();
x.moveTo(280,880);
x.lineTo(420,720);
x.lineTo(560,620);
x.lineTo(520,420);
x.lineTo(620,250);
x.stroke();
}

let btn=document.createElement("button");
btn.className="download-btn";
btn.innerText="Baixar PNG";
btn.onclick=()=>{
let a=document.createElement("a");
a.href=c.toDataURL("image/png");
a.download="jacke-run-card-"+i+".png";
a.click();
};

wrap.appendChild(c);
wrap.appendChild(btn);
grid.appendChild(wrap);
}
}
</script>

</body>
</html>
